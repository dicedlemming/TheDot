<!DOCTYPE html>
<html style="height: 100%">
<head>
	<meta charset="utf-8">
	<meta name="ROBOTS" content="NOINDEX">
	<title>NetVar Dot</title>
	<style>
		html, body { margin: 0; padding: 0; height: 100%; }
		#dotdiv { width: 100%; height: 100%; }
	</style>
</head>
<body>
<div id="dotdiv"></div>
<script type="text/javascript">

var API_URL  = 'https://gcp2.net/api/getcurrentnetvar';
var BEARER   = 'Bearer 5|M1bz2cXL3YLdmuArrI2KaySF0Cl8UxtiDznzK7Mk';
var POLL_MS  = 180000;
var RETRY_MS = 5000;
var EASE     = 0.08;
var CLICK_URL = '';



function mapNetvarToBand(netvar)
{
	var v = parseFloat(netvar);
	if (isNaN(v)) return null;
	if (v < 7)   return 12;
	if (v < 15)   return 10;
	if (v <= 100) return 8;
	if (v <= 160) return 5;
	if (v <= 200) return 3;
	if (v <= 280) return 2;
	return 14;
}


function gcpdot_initialize(id)
{
	var dot = {
		element : null,
		isRetrieving : false,
		targetIndex : null,
		fromIndex : null,
		toIndex : null,
		progress : 1,
		hasSucceeded : false,
		pollTimer : null,

		graphics : {
			gscalar: 1,
			bscalar: 1,
			element : null,
			canvas : null,
			context : null,
			size : 0,
			offsetX : 0,
			offsetY : 0,
			dotImages : [],
			shadowImage : null,
			animateTime : 1000,
			lastKey : null,
			dotSVG : "<svg xmlns='http://www.w3.org/2000/svg' id='__ID__' preserveAspectRatio='xMidYMid meet' width='__WIDTH__' height='__HEIGHT__'><defs><filter id='f1'><feGaussianBlur in='SourceGraphic' stdDeviation='__HBLUR__' /></filter><radialGradient id='highlight' cy='5%' r='50%' gradientTransform='translate(-0.25 0) scale(1.5 1)'><stop offset='10%' stop-color='white' stop-opacity='100'/><stop offset='100%' stop-color='white' stop-opacity='0'/></radialGradient><radialGradient id='grad' cy='92%' r='60%' gradientTransform='translate(-0.2 0) scale(1.4 1)'><stop offset='0%' stop-color='__C1__'/><stop offset='100%' stop-color='__C2__'/></radialGradient></defs><circle fill='url(#grad)' cx='50%' cy='48%' r='45%'/><clipPath id='ic'><circle cx='50%' cy='43%' r='37%' /></clipPath><g filter='url(#f1)'><circle fill='url(#highlight)' cx='50%' cy='53%' r='48%' clip-path='url(#ic)' /></g></svg>",
			shadowSVG : "<svg xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='xMidYMid meet' width='__WIDTH__' height='__HEIGHT__' style='opacity:0.7'><defs><filter id='fh'><feGaussianBlur in='SourceGraphic' stdDeviation='__SHADOWBLUR__ __SHADOWBLUR__' /></filter></defs><circle filter='url(#fh)' fill='black' cx='50%' cy='52%' r='45%'/></svg>",

			dotElements : [
					{id: 'gcpdot0',  color1: '#CDCDCD', color2: '#505050'},
					{id: 'gcpdot1',  color1: '#FFA8C0', color2: '#FF0064'},
					{id: 'gcpdot2',  color1: '#FF1E1E', color2: '#840607'},
					{id: 'gcpdot3',  color1: '#FFB82E', color2: '#C95E00'},
					{id: 'gcpdot4',  color1: '#FFD517', color2: '#C69000'},
					{id: 'gcpdot5',  color1: '#FFFA40', color2: '#C6C300'},
					{id: 'gcpdot6',  color1: '#F9FA00', color2: '#B0CC00'},
					{id: 'gcpdot7',  color1: '#AEFA00', color2: '#88C200'},
					{id: 'gcpdot8',  color1: '#64FA64', color2: '#00A700'},
					{id: 'gcpdot9',  color1: '#64FAAB', color2: '#00B5C9'},
					{id: 'gcpdot10', color1: '#ACF2FF', color2: '#21BCF1'},
					{id: 'gcpdot11', color1: '#0EEEFF', color2: '#0786E1'},
					{id: 'gcpdot12', color1: '#24CBFD', color2: '#0000FF'},
					{id: 'gcpdot13', color1: '#5655CA', color2: '#2400A0'},
					{id: 'gcpdot14', color1: '#3A3A3A', color2: '#000000'}
				],
			initialize : function(element)
			{
				this.gscalar = window.devicePixelRatio || 1;
				this.element = element;

				var w = element.offsetWidth, h = element.offsetHeight;
				var size = Math.min(w, h);
				this.size = size;
				this.offsetX = (w - size) / 2;
				this.offsetY = (h - size) / 2;
				var scalarSizing = size/48.0;
				var highlightBlurX = Math.round(3.7*scalarSizing * this.gscalar);
				var highlightBlurY = Math.round(1.1*scalarSizing * this.gscalar);
				var blurBlock = highlightBlurX + ' ' + highlightBlurY;
				var shadowBlur = 1.1*scalarSizing * this.gscalar;
				var img, svg;

				this.canvas = document.createElement('canvas');
				this.canvas.width = w;
				this.canvas.height = h;
				this.context = this.canvas.getContext('2d');
				this.bscalar = this.context.webkitBackingStorePixelRatio ||
                            this.context.mozBackingStorePixelRatio ||
                            this.context.msBackingStorePixelRatio ||
                            this.context.oBackingStorePixelRatio ||
                            this.context.backingStorePixelRatio || 1;

				if(this.gscalar != this.bscalar)
				{	
					var ratio = this.gscalar / this.bscalar;
					this.canvas.style.width = w + 'px';
					this.canvas.style.height = h + 'px';
					this.canvas.width = w * ratio;
					this.canvas.height = h * ratio;
					this.context.scale(ratio, ratio);
				}

				var self = this;

				element.appendChild(this.canvas);
				this.canvas = this.canvas.getContext("2d");
				for(i = 0; i < this.dotElements.length; i++)
				{
					svg = this.dotSVG.replace("__ID__", 'svgel'+i).replace("__HBLUR__", blurBlock).
						replace("__C1__", this.dotElements[i].color1).replace("__C2__", this.dotElements[i].color2).
						replace("__WIDTH__", size * this.gscalar).replace("__HEIGHT__", size * this.gscalar);

					img = this.dotImages[i] = new Image();
					img.width = size * this.gscalar;
					img.height = size * this.gscalar;
					this.dotImages[i].isImgLoaded = false;
					(f=function(i){
						self.dotImages[i].onload = function() { self.dotImages[i].isImgLoaded = true; };
					})(i);
					this.dotImages[i].src = "data:image/svg+xml;base64,"+btoa(svg);
					//element.appendChild(this.dotImages[i]);
					if(i == 0) {
						svg = this.shadowSVG.replace("__SHADOWBLUR__", shadowBlur).replace("__SHADOWBLUR__", shadowBlur).
						replace("__WIDTH__", size * this.gscalar).replace("__HEIGHT__", size * this.gscalar);
						img = this.shadowImage = new Image();
						img.width = size * this.gscalar;
						img.height = size * this.gscalar;
						this.shadowImage.isImgLoaded = false;
						this.shadowImage.onload = function() {
							self.shadowImage.isImgLoaded = true;
							self.renderLoading();
						};
						this.shadowImage.src = "data:image/svg+xml;base64,"+btoa(svg);
					}
				}

			},
			// Spinner shown until the first value arrives.
			renderLoading : function()
			{
				if(!this.shadowImage || !this.shadowImage.isImgLoaded ||
				   !this.dotImages[0] || !this.dotImages[0].isImgLoaded)
					return;

				var w = this.element.offsetWidth, h = this.element.offsetHeight;
				var size = this.size, ox = this.offsetX, oy = this.offsetY;
				this.context.save();
				this.context.fillStyle = 'rgba(255, 255, 255, 0)';
				this.context.clearRect(0, 0, w, h);
				this.context.globalAlpha = 1.0;
				this.context.drawImage(this.shadowImage, 0, 0, this.shadowImage.width, this.shadowImage.height, ox, oy, size, size);

				var time = Date.now();
				var scale = (time % this.animateTime) / this.animateTime;
				this.context.drawImage(this.dotImages[0], 0, 0, this.dotImages[0].width, this.dotImages[0].height, ox, oy, size, size);
				for(var i = 0; i < 6; i++)
				{
					this.context.fillStyle = 'rgba(255, 255, 255, ' + this.animateScalar(scale - i/6) + ')';
					this.context.beginPath();
					this.context.arc(ox + (size*0.83)/6 * i + size * 0.15, oy + size * 0.455, size * 0.038, 0, Math.PI*2, true);
					this.context.closePath();
					this.context.fill();
				}
				this.context.restore();
				this.lastKey = null;
			},
			renderBand : function(fromIndex, toIndex, progress)
			{
				var imgFrom = this.dotImages[fromIndex];
				var imgTo   = this.dotImages[toIndex];
				if(!this.shadowImage || !this.shadowImage.isImgLoaded ||
				   !imgFrom || !imgFrom.isImgLoaded || !imgTo || !imgTo.isImgLoaded) {
					this.renderLoading();
					return;
				}

				var key = fromIndex + '-' + toIndex + '-' + progress.toFixed(3);
				if(key === this.lastKey) return;
				this.lastKey = key;

				var w = this.element.offsetWidth, h = this.element.offsetHeight;
				var size = this.size, ox = this.offsetX, oy = this.offsetY;
				this.context.save();
				this.context.fillStyle = 'rgba(255, 255, 255, 0)';
				this.context.clearRect(0, 0, w, h);
				this.context.globalAlpha = 1.0;
				this.context.drawImage(this.shadowImage, 0, 0, this.shadowImage.width, this.shadowImage.height, ox, oy, size, size);

				this.context.drawImage(imgFrom, 0, 0, imgFrom.width, imgFrom.height, ox, oy, size, size);
				if(fromIndex !== toIndex && progress > 0) {
					this.context.globalAlpha = progress;
					this.context.drawImage(imgTo, 0, 0, imgTo.width, imgTo.height, ox, oy, size, size);
				}
				this.context.restore();
			},
			animateScalar : function(s)
			{
				s = s - Math.floor(s);
				if(s < .20)
					return Math.round(s / 0.20 * 100)/100;
				if(s < .70)
					return Math.round((0.6 - s) / 0.50 * 100)/100;
				return 0;
			}

		},

		initialize : function(id)
		{
			var self = this;
			this.element = document.getElementById(id);
			if(CLICK_URL) {
				this.element.onclick = function() { top.location.href = CLICK_URL; };
				this.element.style.cursor = 'pointer';
			}
			this.graphics.initialize(this.element);
			setInterval(function(){ self.animateDot(); }, 75);
			window.addEventListener('focus', function() {
				self.getData();
				self.animateDot();
			});
			this.getData();
		},
		scheduleNext : function()
		{
			var self = this;
			var delay = this.hasSucceeded ? POLL_MS : RETRY_MS;
			clearTimeout(this.pollTimer);
			this.pollTimer = setTimeout(function(){ self.getData(); }, delay);
		},
		animateDot : function()
		{
			if(this.toIndex === null) {
				this.graphics.renderLoading(); // loading until the first value arrives
				return;
			}
			if(this.progress < 1) {
				this.progress += EASE;
				if(this.progress >= 1) {
					this.progress = 1;
					this.fromIndex = this.toIndex;
				}
			}
			this.graphics.renderBand(this.fromIndex, this.toIndex, this.progress);
		},
		getData : function()
		{
			if(this.isRetrieving)
				return;
			this.isRetrieving = true;
			var self = this;

			fetch(API_URL, { headers: { Authorization: BEARER } })
				.then(function(res){
					if(!res.ok) throw new Error('HTTP ' + res.status);
					return res.json();
				})
				.then(function(data){
					var raw = (data && data.netvar && data.netvar[0]) ? data.netvar[0].netvar : undefined;
					var idx = mapNetvarToBand(raw);
					if(idx !== null) {
						self.hasSucceeded = true;
						if(self.toIndex === null) {
							self.fromIndex = idx;
							self.toIndex = idx;
							self.progress = 1;
						} else if(idx !== self.toIndex) {
							self.fromIndex = self.toIndex;
							self.toIndex = idx;
							self.progress = 0;
						}
					}
					self.isRetrieving = false;
					self.scheduleNext();
				})
				.catch(function(err){
					console.error('NetVar fetch error:', err);
					self.isRetrieving = false;
					self.scheduleNext();
				});
		}
	};
	dot.initialize(id);
	return dot;
}

gcpdot_initialize('dotdiv');
</script>
</body>
</html>
